# Simple tmux config — no catppuccin, basic colors, keeps the 2-line status
# with CPU/RAM/GPU on the second line via ~/.tmux/scripts/gpu.sh.

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Core
set -g default-terminal "tmux-256color"
set -g renumber-windows on
set -g history-limit 50000
set -g mouse on
set -g set-clipboard on
set -g mode-keys vi
set -g pane-base-index 1
set -g pane-border-lines number
set -g bell-action any

# Three-line status: windows, cpu/ram, gpu
set -g status 3
set -g status-left-length 100
set -g status-right-length 100

set -g status-style "bg=colour234,fg=colour250"

# Left: session name
set -g status-left " #[fg=colour39,bold]#S #[default]│ "

# Right: host · date · time
set -g status-right "#[fg=colour246]#h #[fg=colour240]│#[fg=colour179] %Y-%m-%d #[fg=colour240]│#[fg=colour81] %H:%M "

# Status lines 1 & 2 — explicit bg + trailing pad so they stay colour234 end-to-end
# (otherwise tmux refills the tail with status-style's bg).
set -g status-format[1] "#[bg=colour237,fg=colour179]#(~/.tmux/scripts/cpu_ram.sh #{pane_tty})#[bg=colour237]#{p500: }"
set -g status-format[2] "#[bg=colour237,fg=colour108]#(~/.tmux/scripts/gpu.sh)#[bg=colour237]#{p500: }"

# Auto-rename: short dir, plus " — cmd" when a non-shell process is running.
# allow-rename off stops the shell's OSC-0 title escapes from overriding #W.
# (tmux.conf gets this for free from catppuccin; here we set it explicitly.)
set -wg automatic-rename on
set -g allow-rename off
set -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},,#[noitalics]#{pane_current_command}#[nobold]#[italics](@#{b:pane_current_path})#[default]}"

# Window status — same as tmux.conf, uses #W (window name).
set -g window-status-format " #I#{?#{==:#W,},, : #W} "
set -g window-status-current-format " #I#{?#{==:#W,},, : #W} "
set -g window-status-separator "#[fg=colour240]│"
set -g window-status-style "bg=colour234,fg=colour223"
set -g window-status-last-style "bg=colour234,fg=colour167"
set -g window-status-current-style "bg=colour179,fg=colour234,bold"
set -g window-status-bell-style "bg=colour167,fg=colour234,bold"

# Mouse wheel scroll sensitivity
bind -Tcopy-mode WheelUpPane send -N2 -X scroll-up
bind -Tcopy-mode WheelDownPane send -N2 -X scroll-down

# Reload (this config file specifically — not ~/.tmux.conf which uses catppuccin).
bind r source-file ~/.tmux.conf \; display "Reloaded tmux.conf!"

# Pane nav (vi keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window swap
bind-key -n S-Left  swap-window -t -1\; select-window -t -1
bind-key -n S-Right swap-window -t +1\; select-window -t +1

# Keep at the very bottom
run '~/.tmux/plugins/tpm/tpm'
