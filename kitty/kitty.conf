font_family      MesloLGS NF
bold_font        auto
italic_font      auto
font_size        12.0
# Nerd Fonts v3.3.0
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

map f1 new_window_with_cwd
map f2 new_tab_with_cwd
map f3 launch --type=window bash -c 'read -rp "ssh [host cmd...]: " line && [ -n "$line" ] && set -- $line && host=$1 && shift && if [ $# -gt 0 ]; then exec kitten ssh -t "$host" "$* ; exec \$SHELL -l"; else exec kitten ssh "$host"; fi'
map f4 launch --type=tab bash -c 'read -rp "ssh [host cmd...]: " line && [ -n "$line" ] && set -- $line && host=$1 && shift && if [ $# -gt 0 ]; then exec kitten ssh -t "$host" "$* ; exec \$SHELL -l"; else exec kitten ssh "$host"; fi'

# tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}{index}: {title}"
shell_integration enabled no-title

# Themes
include ./kitty-themes-official/themes/default.conf

# Window borders
window_border_width 5pt
window_margin_width 1
